<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Game Project</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@3.9.4/dist/full.css" rel="stylesheet">
</head>
<body class="bg-base-200">
<div class="container mx-auto p-4">
    <div class="hero min-h-screen">
        <div class="hero-content text-center">
            <div class="max-w-md">
                <h1 class="text-5xl font-bold">🎮 AI Game Project</h1>
                <p class="py-6">Your monolithic Node.js + Python AI game is running!</p>

                <div class="flex flex-col gap-4">
                    <button id="test-server" class="btn btn-primary">Test Server</button>
                    <button id="test-database" class="btn btn-secondary">Test Database</button>
                    <div id="status" class="alert alert-info hidden">
                        <span id="status-message">Ready to test...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="js/main.js"></script>
