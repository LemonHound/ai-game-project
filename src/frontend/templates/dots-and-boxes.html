<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{ title }}</title>
        <link rel="stylesheet" href="/static/css/output.css" />
    </head>
    <body class="min-h-screen bg-base-200">
        {% include 'partials/navbar.html' %}

        <main class="container mx-auto px-4 py-8">
            <!-- Game Header -->
            <div class="text-center mb-8">
                <h1 class="text-4xl font-bold mb-2">Dots and Boxes</h1>
                <p class="text-base-content/70">Connect the dots and claim the boxes</p>
            </div>

            <!-- Auth Gate - Hidden when logged in -->
            <div id="auth-gate" class="hidden">
                <div class="alert alert-info max-w-md mx-auto">
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        fill="none"
                        viewBox="0 0 24 24"
                        class="stroke-current shrink-0 w-6 h-6">
                        <path
                            stroke-linecap="round"
                            stroke-linejoin="round"
                            stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <div>
                        <h3 class="font-bold">Authentication Required</h3>
                        <div class="text-xs">Please log in to start playing</div>
                    </div>
                    <button class="btn btn-sm btn-primary" onclick="openLoginModal()">Log In</button>
                </div>
            </div>

            <!-- Game Container - Hidden until authenticated -->
            <div id="game-container" class="hidden">
                <!-- Score Display -->
                <div class="flex justify-center gap-8 mb-6">
                    <div class="stat bg-base-100 rounded-box shadow place-items-center">
                        <div class="stat-title">You</div>
                        <div id="player-score" class="stat-value text-success">0</div>
                    </div>
                    <div class="stat bg-base-100 rounded-box shadow place-items-center">
                        <div class="stat-title">AI</div>
                        <div id="ai-score" class="stat-value text-error">0</div>
                    </div>
                </div>

                <!-- Game Status -->
                <div class="text-center mb-6">
                    <div id="game-status" class="text-2xl font-bold text-primary">Your Turn</div>
                </div>

                <!-- Dots and Boxes Board -->
                <div class="flex justify-center mb-6">
                    <div id="game-board" class="inline-block p-4 bg-base-300 rounded-lg">
                        <!-- Board will be generated by JavaScript -->
                    </div>
                </div>

                <!-- Game Controls -->
                <div class="flex justify-center gap-4 mb-8">
                    <button id="new-game-btn" class="btn btn-primary">New Game</button>
                    <button id="quit-game-btn" class="btn btn-ghost">Back to Games</button>
                </div>
            </div>
        </main>

        {% include 'partials/footer.html' %} {% include 'partials/auth-modal.html' %}

        <script src="/static/js/dots-and-boxes.js"></script>
    </body>
</html>
