<!-- Login Modal -->
<dialog id="login-modal" class="modal">
    <div class="modal-box">
        <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
        </form>
        <h3 class="font-bold text-lg mb-4">Log In</h3>

        <form id="login-form" class="space-y-4">
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Email</span>
                </label>
                <input
                    type="email"
                    name="email"
                    placeholder="your@email.com"
                    class="input input-bordered w-full"
                    required />
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text">Password</span>
                </label>
                <input
                    type="password"
                    name="password"
                    placeholder="••••••••"
                    class="input input-bordered w-full"
                    required />
            </div>

            <div class="form-control">
                <label class="label cursor-pointer justify-start gap-2">
                    <input type="checkbox" name="rememberMe" class="checkbox checkbox-sm" />
                    <span class="label-text">Remember me</span>
                </label>
            </div>

            <div id="login-error" class="alert alert-error hidden">
                <span></span>
            </div>

            <button type="submit" class="btn btn-primary w-full">Log In</button>
        </form>

        <div class="divider">OR</div>

        <button id="google-login-btn" type="button" class="btn btn-outline w-full gap-2">
            <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path
                    fill="currentColor"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path
                    fill="currentColor"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path
                    fill="currentColor"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path
                    fill="currentColor"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Sign in with Google
        </button>

        <p class="text-center mt-4 text-sm">
            Don't have an account?
            <button type="button" class="link link-primary" onclick="switchToRegister()">Sign up</button>
        </p>
    </div>
    <form method="dialog" class="bg-primary">
        <button>close</button>
    </form>
</dialog>

<!-- Register Modal -->
<dialog id="register-modal" class="modal">
    <div class="modal-box bg-base-100 w-full max-w-md">
        <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
        </form>
        <h3 class="font-bold text-lg mb-4">Create Account</h3>

        <form id="register-form" class="space-y-4">
            <div class="form-control">
                <label class="label">
                    <span class="label-text">Username</span>
                </label>
                <input
                    type="text"
                    name="username"
                    placeholder="username"
                    class="input input-bordered w-full"
                    required />
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text">Email</span>
                </label>
                <input
                    type="email"
                    name="email"
                    placeholder="your@email.com"
                    class="input input-bordered w-full"
                    required />
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text">Display Name (optional)</span>
                </label>
                <input type="text" name="displayName" placeholder="Your Name" class="input input-bordered w-full" />
            </div>

            <div class="form-control">
                <label class="label">
                    <span class="label-text">Password</span>
                </label>
                <input
                    type="password"
                    name="password"
                    placeholder="••••••••"
                    class="input input-bordered w-full"
                    minlength="6"
                    required />
                <label class="label">
                    <span class="label-text-alt">At least 6 characters</span>
                </label>
            </div>

            <div id="register-error" class="alert alert-error hidden">
                <span></span>
            </div>

            <button type="submit" class="btn btn-primary w-full">Create Account</button>
        </form>

        <div class="divider">OR</div>

        <button id="google-register-btn" type="button" class="btn btn-outline w-full gap-2">
            <svg class="w-5 h-5" viewBox="0 0 24 24">
                <path
                    fill="currentColor"
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                <path
                    fill="currentColor"
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                <path
                    fill="currentColor"
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
                <path
                    fill="currentColor"
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            </svg>
            Sign up with Google
        </button>

        <p class="text-center mt-4 text-sm">
            Already have an account?
            <button type="button" class="link link-primary" onclick="switchToLogin()">Log in</button>
        </p>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>
