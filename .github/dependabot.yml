version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    assignees:
      - LemonHound
    groups:
      npm-all:
        patterns:
          - "*"
    ignore:
      # eslint-plugin-jsdoc peer dep range is "^7||^8||^9"; unblock when it adds v10 support
      - dependency-name: "eslint"
        versions: [">=10"]
      - dependency-name: "@eslint/js"
        versions: [">=10"]

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    assignees:
      - LemonHound
    groups:
      pip-all:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    assignees:
      - LemonHound
    groups:
      actions-all:
        patterns:
          - "*"
