version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    assignees:
      - LemonHound
    groups:
      npm-all:
        patterns:
          - "*"

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    assignees:
      - LemonHound
    groups:
      pip-all:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 1
    assignees:
      - LemonHound
    groups:
      actions-all:
        patterns:
          - "*"
