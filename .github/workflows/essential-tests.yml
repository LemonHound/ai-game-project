name: ✅ Essential Tests (Fast Smoke)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  essential-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: test_ai_game_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 🚀 Checkout
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🎨 Build CSS
        run: npm run build-css

      - name: 🗄️ Setup environment
        run: |
          echo "DB_HOST=localhost" > .env
          echo "DB_PORT=5432" >> .env
          echo "DB_NAME=test_ai_game_db" >> .env
          echo "DB_USER=testuser" >> .env
          echo "DB_PASSWORD=testpassword" >> .env
          echo "NODE_ENV=test" >> .env
          echo "PORT=3000" >> .env

      - name: 🧪 Unit Tests Only
        run: npm run test:unit

      - name: 📦 Install Playwright (Chromium Only)
        run: npx playwright install chromium

      - name: 🚀 Critical Smoke Tests Only
        run: |
          npx playwright test tests/smoke/routes.spec.js --project=chromium \
            --grep "homepage loads correctly|API health endpoint works|database connection works"

      - name: ✅ Success Summary
        if: success()
        run: |
          echo "## ✅ Essential Tests Passed!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Core functionality verified:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Homepage loads" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Database connects" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ API responds" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Unit tests pass" >> $GITHUB_STEP_SUMMARY

      - name: ❌ Failure Summary
        if: failure()
        run: |
          echo "## ❌ Essential Tests Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the logs above for details" >> $GITHUB_STEP_SUMMARY