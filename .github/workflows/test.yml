name: 🧪 Test Suite

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: test_ai_game_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 🚀 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🎨 Build CSS
        run: npm run build-css

      - name: 🗄️ Setup test database
        run: |
          # Create test environment file
          echo "DB_HOST=localhost" > .env.test
          echo "DB_PORT=5432" >> .env.test
          echo "DB_NAME=test_ai_game_db" >> .env.test
          echo "DB_USER=testuser" >> .env.test
          echo "DB_PASSWORD=testpassword" >> .env.test
          echo "NODE_ENV=test" >> .env.test
          echo "PORT=3001" >> .env.test
          
          # Setup database schema (if you have a setup script)
          # PGPASSWORD=testpassword psql -h localhost -U testuser -d test_ai_game_db -f scripts/setup-database.sql || true

      - name: 🧪 Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: test

      - name: 📦 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🚀 Run smoke tests
        run: npm run test:smoke
        env:
          NODE_ENV: test

      - name: 🎮 Run game tests
        run: npm run test:games
        env:
          NODE_ENV: test

      - name: 🔐 Run auth tests (expect failures)
        run: npm run test:auth || true
        env:
          NODE_ENV: test

      - name: 📡 Run API tests
        run: npm run test:api
        env:
          NODE_ENV: test

      - name: 🧭 Run navigation tests
        run: npm run test:navigation
        env:
          NODE_ENV: test

      - name: ⚡ Run performance tests
        run: npm run test:performance
        env:
          NODE_ENV: test

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: |
            test-results/
            playwright-report/
            coverage/
          retention-days: 7

      - name: 📈 Upload Playwright report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report-node-${{ matrix.node-version }}
          path: playwright-report/
          retention-days: 7

  # Separate job for full E2E tests (slower, runs after basic tests pass)
  e2e:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: test_ai_game_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 🚀 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🎨 Build CSS
        run: npm run build-css

      - name: 🗄️ Setup test environment
        run: |
          echo "DB_HOST=localhost" > .env.test
          echo "DB_PORT=5432" >> .env.test
          echo "DB_NAME=test_ai_game_db" >> .env.test
          echo "DB_USER=testuser" >> .env.test
          echo "DB_PASSWORD=testpassword" >> .env.test
          echo "NODE_ENV=test" >> .env.test
          echo "PORT=3001" >> .env.test

      - name: 📦 Install Playwright browsers
        run: npx playwright install --with-deps

      - name: 🎯 Run full E2E test suite
        run: npm run test:e2e
        env:
          NODE_ENV: test

      - name: 📊 Upload full E2E results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

  # Summary job that runs after all tests
  test-summary:
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: always()

    steps:
      - name: 📋 Test Summary
        run: |
          echo "## 🧪 Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ Expected to Pass:" >> $GITHUB_STEP_SUMMARY
          echo "- Unit Tests" >> $GITHUB_STEP_SUMMARY
          echo "- Smoke Tests (basic page loading)" >> $GITHUB_STEP_SUMMARY
          echo "- Game Tests (tic-tac-toe functionality)" >> $GITHUB_STEP_SUMMARY
          echo "- API Tests (backend endpoints)" >> $GITHUB_STEP_SUMMARY
          echo "- Basic Navigation Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ⚠️ Expected to Fail (Until Features Built):" >> $GITHUB_STEP_SUMMARY
          echo "- Authentication Tests (no login/register UI yet)" >> $GITHUB_STEP_SUMMARY
          echo "- Some Navigation Tests (game links on homepage)" >> $GITHUB_STEP_SUMMARY
          echo "- Advanced Game Features (rules modals, etc.)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📈 Progress Tracking:" >> $GITHUB_STEP_SUMMARY
          echo "As you implement features, tests will automatically turn green!" >> $GITHUB_STEP_SUMMARY
          echo "See the uploaded test reports for detailed results." >> $GITHUB_STEP_SUMMARY