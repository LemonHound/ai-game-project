name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 0'

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '!**/*.md'

  analyze:
    name: Analyze
    needs: changes
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    strategy:
      matrix:
        language: [javascript-typescript, python]
    env:
      RUN_ANALYSIS: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' }}
    steps:
      - name: Skip (markdown-only changes)
        if: env.RUN_ANALYSIS != 'true'
        run: echo "Only markdown files changed -- skipping analysis"

      - uses: actions/checkout@v6
        if: env.RUN_ANALYSIS == 'true'

      - uses: github/codeql-action/init@v4
        if: env.RUN_ANALYSIS == 'true'
        with:
          languages: ${{ matrix.language }}

      - uses: github/codeql-action/autobuild@v4
        if: env.RUN_ANALYSIS == 'true'

      - uses: github/codeql-action/analyze@v4
        if: env.RUN_ANALYSIS == 'true'
