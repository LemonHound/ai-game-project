name: 🧪 CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * 1'  # Every Monday at 2 AM
  workflow_dispatch:  # Allow manual triggering

jobs:
  # Code Quality (Formatting Only)
  code-quality:
    name: 🎨 Code Formatting
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🎨 Check code formatting (Prettier)
        run: npm run format:check

      - name: 🔒 Security audit
        run: npm audit --audit-level=moderate

  # Unit Tests
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: 📊 Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: unit-tests
          fail_ci_if_error: false

  # Database & Setup Tests
  smoke-tests:
    name: 🚀 Smoke Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: 'testpassword'
          POSTGRES_USER: testuser
          POSTGRES_DB: test_ai_game_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: 🚀 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🎨 Build CSS
        run: npm run build-css

      - name: 🗄️ Setup test environment
        run: |
          echo "DB_HOST=localhost" > .env
          echo "DB_PORT=5432" >> .env
          echo "DB_NAME=test_ai_game_db" >> .env
          echo "DB_USER=testuser" >> .env
          echo "DB_PASSWORD=testpassword" >> .env
          echo "NODE_ENV=test" >> .env
          echo "PORT=3001" >> .env
          
          # Setup database schema
          PGPASSWORD=testpassword psql -h localhost -U testuser -d test_ai_game_db -f scripts/test-setup.sql || true

      - name: 📦 Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: 🚀 Run smoke tests
        run: npm run test:smoke -- --project=chromium
        env:
          NODE_ENV: test
          CI: true

      - name: 📤 Upload smoke test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 3

