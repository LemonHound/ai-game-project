name: CI Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  code-quality:
    name: Code Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run format:check

      - run: npm audit --audit-level=moderate

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run test:unit:coverage

      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: unit-tests
          fail_ci_if_error: false

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: test_ai_game_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: npm ci
      - run: pip install -r requirements.txt
      - run: npm run build
      - name: Setup test environment
        run: |
          cat > .env <<EOF
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=test_ai_game_db
          DB_USER=testuser
          DB_PASSWORD=testpassword
          NODE_ENV=test
          PORT=8000
          WEBSITE_URL=http://localhost:8000
          EOF
          PGPASSWORD=testpassword psql -h localhost -U testuser -d test_ai_game_db -f scripts/setup-database.sql || true
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke -- --project=chromium
        env:
          NODE_ENV: test
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 3

