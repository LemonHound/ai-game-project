name: CI Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - '!**/*.md'

  code-quality:
    name: Code Formatting
    needs: changes
    runs-on: ubuntu-latest
    env:
      RUN_TESTS: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Skip (markdown-only changes)
        if: env.RUN_TESTS != 'true'
        run: echo "Only markdown files changed -- skipping tests"

      - uses: actions/checkout@v6
        if: env.RUN_TESTS == 'true'

      - uses: actions/setup-node@v6
        if: env.RUN_TESTS == 'true'
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v6
        if: env.RUN_TESTS == 'true'
        with:
          python-version: '3.11'

      - if: env.RUN_TESTS == 'true'
        run: npm ci

      - if: env.RUN_TESTS == 'true'
        run: pip install pydocstyle

      - if: env.RUN_TESTS == 'true'
        run: npm run format:check

      - if: env.RUN_TESTS == 'true'
        run: npm run lint

      - if: env.RUN_TESTS == 'true'
        run: pydocstyle src/backend/

      - if: env.RUN_TESTS == 'true'
        run: npm audit --audit-level=high

  unit-tests:
    name: Unit Tests
    needs: changes
    runs-on: ubuntu-latest
    env:
      RUN_TESTS: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Skip (markdown-only changes)
        if: env.RUN_TESTS != 'true'
        run: echo "Only markdown files changed -- skipping tests"

      - uses: actions/checkout@v6
        if: env.RUN_TESTS == 'true'

      - uses: actions/setup-node@v6
        if: env.RUN_TESTS == 'true'
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v6
        if: env.RUN_TESTS == 'true'
        with:
          python-version: '3.11'

      - if: env.RUN_TESTS == 'true'
        run: npm ci

      - if: env.RUN_TESTS == 'true'
        run: pip install -r requirements.txt

      - if: env.RUN_TESTS == 'true'
        run: npm run test:unit:coverage

      - if: env.RUN_TESTS == 'true'
        run: python -m pytest tests/unit/ -v
        env:
          PYTHONPATH: src/backend

      - uses: codecov/codecov-action@v6
        if: env.RUN_TESTS == 'true'
        with:
          file: ./coverage/lcov.info
          flags: unittests
          name: unit-tests
          fail_ci_if_error: false

  smoke-tests:
    name: Smoke Tests
    needs: changes
    runs-on: ubuntu-latest
    env:
      RUN_TESTS: ${{ needs.changes.outputs.code == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: test_ai_game_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Skip (markdown-only changes)
        if: env.RUN_TESTS != 'true'
        run: echo "Only markdown files changed -- skipping tests"

      - uses: actions/checkout@v6
        if: env.RUN_TESTS == 'true'
      - uses: actions/setup-node@v6
        if: env.RUN_TESTS == 'true'
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        if: env.RUN_TESTS == 'true'
        with:
          python-version: '3.11'
      - if: env.RUN_TESTS == 'true'
        run: npm ci
      - if: env.RUN_TESTS == 'true'
        run: pip install -r requirements.txt
      - if: env.RUN_TESTS == 'true'
        run: npm run build
      - name: Setup test environment
        if: env.RUN_TESTS == 'true'
        run: |
          cat > .env <<EOF
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=test_ai_game_db
          DB_USER=testuser
          DB_PASSWORD=testpassword
          NODE_ENV=test
          PORT=8000
          WEBSITE_URL=http://localhost:8000
          EOF
          python -m alembic upgrade head
          python scripts/seed_test_data.py
        env:
          PYTHONPATH: src/backend
      - if: env.RUN_TESTS == 'true'
        run: npx playwright install --with-deps chromium
      - if: env.RUN_TESTS == 'true'
        run: npm run test:smoke -- --project=chromium
      - if: env.RUN_TESTS == 'true'
        run: npx playwright test tests/api/persistence.spec.ts tests/api/ttt.spec.ts tests/api/error-handling.spec.ts tests/api/telemetry.spec.ts tests/api/about.spec.ts --project=chromium
        env:
          NODE_ENV: test
          CI: true
      - uses: actions/upload-artifact@v7
        if: always() && env.RUN_TESTS == 'true'
        with:
          name: smoke-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 3

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [changes, code-quality, unit-tests, smoke-tests]
    if: always()
    steps:
      - name: Generate Test Summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Formatting | ${{ needs.code-quality.result == 'success' && 'Pass' || (needs.code-quality.result == 'skipped' && 'Skipped' || 'Fail') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && 'Pass' || (needs.unit-tests.result == 'skipped' && 'Skipped' || 'Fail') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result == 'success' && 'Pass' || (needs.smoke-tests.result == 'skipped' && 'Skipped' || 'Fail') }} |" >> $GITHUB_STEP_SUMMARY
