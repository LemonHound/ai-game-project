          EOF
          PGPASSWORD=testpassword psql -h localhost -U testuser -d test_ai_game_db -f scripts/setup-database.sql || true
      - run: npx playwright install --with-deps ${{ matrix.browser }}
      - run: npm run test:smoke -- --project=${{ matrix.browser }}
        env:
          NODE_ENV: test
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cross-browser-${{ matrix.browser }}-results
          path: |
            test-results/
            playwright-report/
          retention-days: 3

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, smoke-tests, auth-tests, game-tests, api-tests, navigation-tests, performance-tests]
    if: always()
    steps:
      - name: Generate Test Summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Formatting | ${{ needs.code-quality.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Unit Tests | ${{ needs.unit-tests.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-tests.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth Tests | ${{ needs.auth-tests.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Game Tests | ${{ needs.game-tests.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| API Tests | ${{ needs.api-tests.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Navigation Tests | ${{ needs.navigation-tests.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance Tests | ${{ needs.performance-tests.result == 'success' && 'Pass' || 'Fail' }} |" >> $GITHUB_STEP_SUMMARY
