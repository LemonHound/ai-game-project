  cross-browser-tests:
    name: Cross-browser Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [smoke-tests, auth-tests, game-tests, api-tests]
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
