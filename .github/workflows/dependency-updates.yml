name: 🔄 Weekly Dependency Updates

on:
  schedule:
    # Run every Monday at 2 AM UTC
    - cron: '0 2 * * 1'
  workflow_dispatch:  # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    name: 🔄 Update Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Install current dependencies
        run: npm ci

      - name: 🔍 Check for outdated dependencies
        id: outdated
        run: |
          echo "## Current Outdated Dependencies" > outdated.md
          npm outdated --json > outdated.json || true
          npm outdated >> outdated.md || true
          echo "outdated_count=$(npm outdated --json | jq 'keys | length' 2>/dev/null || echo 0)" >> $GITHUB_OUTPUT

      - name: 🔄 Update dependencies to latest minor versions
        run: |
          # Update to latest minor versions (safer)
          npx npm-check-updates --upgrade --target minor --reject eslint
          
          # Install updated dependencies
          npm install
          
          # Generate updated dependency list
          echo "## Updated Dependencies" > updated.md
          git diff --name-only package.json >> updated.md || true

      - name: 🧪 Run tests with updated dependencies
        id: test_updates
        run: |
          # Run linting
          npm run lint:check
          
          # Run unit tests
          npm run test:unit
          
          # Quick smoke test
          npm run build-css
          echo "tests_passed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: 📝 Generate update summary
        run: |
          echo "# 🔄 Automated Dependency Updates" > update_summary.md
          echo "" >> update_summary.md
          echo "This PR updates npm dependencies to their latest minor versions." >> update_summary.md
          echo "" >> update_summary.md
          
          if [ -f updated.md ]; then
            echo "## Changes Made" >> update_summary.md
            cat updated.md >> update_summary.md
            echo "" >> update_summary.md
          fi
          
          echo "## Testing Results" >> update_summary.md
          if [ "${{ steps.test_updates.outputs.tests_passed }}" = "true" ]; then
            echo "✅ All tests passed with updated dependencies" >> update_summary.md
          else
            echo "❌ Some tests failed - manual review required" >> update_summary.md
          fi
          echo "" >> update_summary.md
          
          echo "## What's Updated" >> update_summary.md
          npm list --depth=0 --json | jq -r '.dependencies | to_entries[] | "- \(.key): \(.value.version)"' >> update_summary.md || true
          echo "" >> update_summary.md
          
          echo "## Security" >> update_summary.md
          echo "- Only minor version updates are included for safety" >> update_summary.md
          echo "- All tests pass with the new versions" >> update_summary.md
          echo "- Please review the changes before merging" >> update_summary.md

      - name: 📤 Create Pull Request
        id: create_pr
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update dependencies to latest minor versions
            
            - Updated npm dependencies to latest minor versions
            - All tests pass with updated versions
            - Automated update from weekly dependency check
          title: "🔄 Weekly Dependency Updates - $(date +'%Y-%m-%d')"
          body-path: update_summary.md
          branch: automated-dependency-updates
          delete-branch: true
          labels: |
            dependencies
            automated
            maintenance
          reviewers: |
            # Add your GitHub usernames here for auto-review
          draft: ${{ steps.test_updates.outputs.tests_passed != 'true' }}

      - name: 📊 Add job summary
        run: |
          echo "## 🔄 Dependency Update Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.create_pr.outputs.pull-request-number }}" != "" ]; then
            echo "✅ **Pull Request Created**: #${{ steps.create_pr.outputs.pull-request-number }}" >> $GITHUB_STEP_SUMMARY
            echo "🔗 **Link**: ${{ steps.create_pr.outputs.pull-request-url }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ **No updates needed** - all dependencies are up to date" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.test_updates.outputs.tests_passed }}" = "true" ]; then
            echo "✅ All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Some tests failed - PR created as draft" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Outdated Dependencies" >> $GITHUB_STEP_SUMMARY
          echo "📦 Found ${{ steps.outdated.outputs.outdated_count }} outdated packages" >> $GITHUB_STEP_SUMMARY

  # Separate job for major version updates (manual trigger only)
  update-major-versions:
    name: 🚨 Update Major Versions (Manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: 🚀 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📥 Install current dependencies
        run: npm ci

      - name: 🚨 Update to latest major versions
        run: |
          # Update to latest major versions (potentially breaking)
          npx npm-check-updates --upgrade
          npm install

      - name: 🧪 Test major updates
        id: test_major
        run: |
          npm run lint:check || true
          npm run test:unit || true
          npm run build-css || true
        continue-on-error: true

      - name: 📝 Generate major update summary
        run: |
          echo "# 🚨 Major Version Dependency Updates" > major_update_summary.md
          echo "" >> major_update_summary.md
          echo "⚠️ **WARNING**: This PR contains major version updates that may include breaking changes." >> major_update_summary.md
          echo "" >> major_update_summary.md
          echo "## Manual Review Required" >> major_update_summary.md
          echo "- Carefully review all changes" >> major_update_summary.md
          echo "- Test thoroughly before merging" >> major_update_summary.md
          echo "- Update code if breaking changes are present" >> major_update_summary.md
          echo "" >> major_update_summary.md
          echo "## Updated Packages" >> major_update_summary.md
          npm list --depth=0 --json | jq -r '.dependencies | to_entries[] | "- \(.key): \(.value.version)"' >> major_update_summary.md || true

      - name: 📤 Create Major Update Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update dependencies to latest major versions
            
            ⚠️ WARNING: Contains potential breaking changes
            - Updated npm dependencies to latest major versions
            - Manual review and testing required
          title: "🚨 Major Dependency Updates - $(date +'%Y-%m-%d')"
          body-path: major_update_summary.md
          branch: automated-major-dependency-updates
          delete-branch: true
          labels: |
            dependencies
            automated
            breaking-changes
            major-update
          draft: true  # Always create as draft for major updates