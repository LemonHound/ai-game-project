name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: ["CI Tests"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev

      - name: Build and push Docker image
        id: build
        run: |
          IMAGE="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ai-game-app/app:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ai-game-app
          region: ${{ secrets.GCP_REGION }}
          image: ${{ steps.build.outputs.image }}
          add_cloudsql_instances: ${{ secrets.CLOUD_SQL_INSTANCE }}
          env_vars: |
            ENVIRONMENT=production
          secrets: |
            DB_NAME=db-name:latest
            DB_USER=db-user:latest
            DB_PASSWORD=db-password:latest
            DB_SOCKET_PATH=db-socket-path:latest
            WEBSITE_URL=website-url:latest
            GOOGLE_CLIENT_ID=google-client-id:latest
            GOOGLE_CLIENT_SECRET=google-client-secret:latest
            GOOGLE_REDIRECT_URI=google-redirect-uri:latest

      - name: Post deploy status to commit
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          STATUS: ${{ steps.deploy.outcome }}
          URL: ${{ steps.deploy.outputs.url }}
        run: |
          if [ "$STATUS" = "success" ]; then
            BODY="Deploy succeeded. Service URL: $URL"
          else
            BODY="Deploy failed. Check the workflow run for details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi
          gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/comments" \
            --method POST \
            -f body="$BODY"

      - name: Write deploy summary
        if: always()
        run: |
          echo "## Deploy Result" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ steps.deploy.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ steps.build.outputs.image }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Service URL:** ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
