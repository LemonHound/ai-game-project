name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      ci: ${{ steps.filter.outputs.ci }}
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            backend:
              - 'src/backend/**'
              - 'requirements*.txt'
              - 'alembic.ini'
              - 'scripts/**'
              - 'tests/unit/test_*.py'
              - 'tests/integration/**'
              - 'tests/api_tests/**'
            frontend:
              - 'src/frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'tsconfig*.json'
            ci:
              - '.github/workflows/**'
              - 'Dockerfile'
              - 'docker-compose*.yml'
              - 'playwright.config.js'
            code:
              - '!**/*.md'

  code-quality:
    name: Code Quality
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.code == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: npm ci
      - run: pip install pydocstyle pip-audit
      - run: npm run format:check
      - run: npm run lint
      - run: pydocstyle src/backend/
      - run: npm audit --audit-level=high
      - run: pip-audit -r requirements.txt --desc on

  python-unit:
    name: Python Unit Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: pip install -r requirements.txt -r requirements-test.txt
      - run: python -m pytest tests/unit/ -v --tb=short
        env:
          PYTHONPATH: src/backend

  frontend-unit:
    name: Frontend Unit Tests
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage
      - uses: codecov/codecov-action@v6
        with:
          file: ./coverage/lcov.info
          flags: frontend-unit
          fail_ci_if_error: false

  integration:
    name: Integration + API Tests
    needs: [changes, python-unit]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_USER: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      ENVIRONMENT: test
      DB_HOST: localhost
      DB_PORT: '5432'
      DB_NAME: test_db
      DB_USER: test
      DB_PASSWORD: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: pip install -r requirements.txt -r requirements-test.txt
      - run: python -m alembic upgrade head
      - run: python scripts/seed_test_data.py
        env:
          PYTHONPATH: src/backend
      - run: python -m pytest tests/integration/ tests/api_tests/ -v --tb=short
        env:
          PYTHONPATH: src/backend

  e2e-tests:
    name: E2E Tests (Chromium)
    needs: [changes, code-quality]
    runs-on: ubuntu-latest
    if: needs.changes.outputs.code == 'true' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: test_ai_game_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'
      - run: npm ci
      - run: pip install -r requirements.txt
      - run: npm run build
      - name: Setup test environment
        run: |
          cat > .env <<'DOTENV'
          DB_HOST=localhost
          DB_PORT=5432
          DB_NAME=test_ai_game_db
          DB_USER=testuser
          DB_PASSWORD=testpassword
          NODE_ENV=test
          PORT=8000
          WEBSITE_URL=http://localhost:8000
          DOTENV
          sed -i 's/^ *//' .env
          python -m alembic upgrade head
          python scripts/seed_test_data.py
        env:
          PYTHONPATH: src/backend
      - run: npx playwright install --with-deps chromium
      - run: npm run test:smoke -- --project=chromium
        env:
          NODE_ENV: test
          CI: true
      - run: >-
          npx playwright test
          tests/api/persistence.spec.ts
          tests/api/ttt.spec.ts
          tests/api/error-handling.spec.ts
          tests/api/telemetry.spec.ts
          tests/api/about.spec.ts
          --project=chromium
        env:
          NODE_ENV: test
          CI: true
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: e2e-test-results
          path: |
            test-results/
            playwright-report/
          retention-days: 3

  security:
    name: Security (CodeQL)
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.code == 'true' || github.event_name == 'schedule'
    permissions:
      security-events: write
    strategy:
      matrix:
        language: [javascript-typescript, python]
    steps:
      - uses: actions/checkout@v6
      - uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/autobuild@v4
      - uses: github/codeql-action/analyze@v4

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [changes, code-quality, python-unit, frontend-unit, integration, e2e-tests, security]
    if: always()
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Check PR mergeability (merge conflict)
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr="${{ github.event.pull_request.number }}"
          mergeable=""
          for i in $(seq 1 45); do
            mergeable=$(gh pr view "$pr" --repo "${{ github.repository }}" --json mergeable -q .mergeable)
            if [ "$mergeable" = "true" ] || [ "$mergeable" = "false" ]; then
              break
            fi
            sleep 2
          done
          if [ "$mergeable" = "false" ]; then
            echo "::error::Pull request is not mergeable (resolve merge conflicts with the base branch)."
            exit 1
          fi
          if [ -z "$mergeable" ] || [ "$mergeable" = "null" ]; then
            echo "::error::Mergeability still unknown after retries; refusing to pass the gate."
            exit 1
          fi

      - name: Generate Test Summary
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Suite | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality.result == 'success' && 'Pass' || (needs.code-quality.result == 'skipped' && 'Skipped' || 'Fail') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Unit | ${{ needs.python-unit.result == 'success' && 'Pass' || (needs.python-unit.result == 'skipped' && 'Skipped' || 'Fail') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Unit | ${{ needs.frontend-unit.result == 'success' && 'Pass' || (needs.frontend-unit.result == 'skipped' && 'Skipped' || 'Fail') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Integration + API | ${{ needs.integration.result == 'success' && 'Pass' || (needs.integration.result == 'skipped' && 'Skipped' || 'Fail') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E (Chromium) | ${{ needs.e2e-tests.result == 'success' && 'Pass' || (needs.e2e-tests.result == 'skipped' && 'Skipped' || 'Fail') }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security (CodeQL) | ${{ needs.security.result == 'success' && 'Pass' || (needs.security.result == 'skipped' && 'Skipped' || 'Fail') }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any suite failed or was cancelled
        env:
          CODE_QUALITY: ${{ needs.code-quality.result }}
          PYTHON_UNIT: ${{ needs.python-unit.result }}
          FRONTEND_UNIT: ${{ needs.frontend-unit.result }}
          INTEGRATION: ${{ needs.integration.result }}
          E2E: ${{ needs.e2e-tests.result }}
          SECURITY: ${{ needs.security.result }}
        run: |
          set -euo pipefail
          bad=0
          for name_val in \
            "Code Quality:$CODE_QUALITY" \
            "Python Unit:$PYTHON_UNIT" \
            "Frontend Unit:$FRONTEND_UNIT" \
            "Integration + API:$INTEGRATION" \
            "E2E (Chromium):$E2E" \
            "Security (CodeQL):$SECURITY"; do
            name="${name_val%%:*}"
            val="${name_val#*:}"
            if [ "$val" = "failure" ] || [ "$val" = "cancelled" ]; then
              echo "::error::$name job result: $val"
              bad=1
            fi
          done
          exit "$bad"
