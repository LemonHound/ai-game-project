name: pip-compile

on:
  pull_request:
    paths:
      - requirements.in

permissions:
  contents: write

jobs:
  recompile:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install pip-tools
        run: pip install pip-tools

      - name: Recompile requirements.txt
        run: pip-compile requirements.in --output-file requirements.txt --strip-extras

      - name: Commit updated requirements.txt if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.txt
          git diff --cached --quiet || git commit -m "chore: recompile requirements.txt from requirements.in"
          git push
